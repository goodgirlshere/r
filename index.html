<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новое сообщение</title>

<style>
body{
    margin:0;
    background:#0f0f12;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    max-width:420px;
    width:100%;
    padding:20px;
}

.topnotice{
    text-align:center;
    font-size:14px;
    color:#ffcf4a;
    margin-bottom:12px;
}

.profile{
    text-align:center;
}

.profile img{
    width:100%;
    border-radius:18px;
    filter:blur(6px);
}

.online{
    color:#3cff7a;
    margin-top:8px;
    font-size:14px;
}

.chat{
    background:#1a1a1f;
    border-radius:14px;
    padding:14px;
    margin-top:20px;
}

.message{
    background:#2b2b31;
    padding:12px;
    border-radius:12px;
    display:inline-block;
    max-width:80%;
    line-height:1.4;
}

.typing{
    margin-top:10px;
    display:flex;
    gap:5px;
}

.dot{
    width:8px;
    height:8px;
    background:#aaa;
    border-radius:50%;
    animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

button{
    width:100%;
    margin-top:25px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#ff2e63;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.lock{
    text-align:center;
    margin-top:12px;
    font-size:13px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="topnotice">
У вас 1 непрочитанное сообщение
</div>

<div class="profile">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330">
<div class="online">● Сейчас онлайн</div>
</div>

<div class="chat">
<div class="message">
Привет 🙂 Я кажется нашла тебя рядом...
</div>

<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>

<button onclick="goOffer()">Продолжить переписку</button>

<div class="lock">
Доступ откроется после подтверждения профиля
</div>

</div>

<script>
function goOffer(){
    window.location.href="https://yyzpmrp.sexylady-online.com/rv62h14?s1=git";
}
</script>

</body>
</html>
